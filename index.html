<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f7cff;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4f7cff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #3a63e0; }
    .input-row button:disabled { background: #a0b4ff; cursor: not-allowed; }

    .summary {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover { background: #f7f8fa; }

    li.checked .item-text {
      text-decoration: line-through;
      color: #b0b0b0;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f7cff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1a1a1a;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      color: #ff4d4d;
      background: #fff0f0;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 0.9rem;
    }

    .loading {
      text-align: center;
      color: #aaa;
      padding: 40px 0;
      font-size: 0.9rem;
    }

    .error-msg {
      background: #fff0f0;
      color: #d32f2f;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." autocomplete="off">
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="summary" id="summary"></div>
    <div class="loading" id="loading">불러오는 중...</div>
    <ul id="list"></ul>
    <div class="empty" id="empty" style="display:none">아이템을 추가해 보세요!</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://mmcqzdxhworqlvulieye.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tY3F6ZHhod29ycWx2dWxpZXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDAyMDgsImV4cCI6MjA5MjUxNjIwOH0.QFACr91T2rGxLoB-K-omeN5XwO1n9o0C98O98LvL3OY';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];
    let isBusy = false;

    function setBusy(busy) {
      isBusy = busy;
      document.getElementById('addBtn').disabled = busy;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        showError('데이터를 불러오지 못했습니다: ' + error.message);
        return;
      }
      items = data;
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const loading = document.getElementById('loading');
      const summary = document.getElementById('summary');

      loading.style.display = 'none';
      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        summary.textContent = '';
        return;
      }

      empty.style.display = 'none';
      const checked = items.filter(i => i.checked).length;
      summary.textContent = `총 ${items.length}개 · ${checked}개 완료`;

      items.forEach((item) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        li.innerHTML = `
          <input type="checkbox" ${item.checked ? 'checked' : ''}>
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn">✕</button>
        `;

        li.querySelector('input[type="checkbox"]').addEventListener('change', () => toggle(item.id, !item.checked));
        li.querySelector('.delete-btn').addEventListener('click', () => remove(item.id));

        list.appendChild(li);
      });
    }

    async function addItem() {
      if (isBusy) return;
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;

      setBusy(true);
      showError('');
      const { error } = await db.from('shopping_items').insert({ text, checked: false });
      if (error) {
        showError('추가에 실패했습니다: ' + error.message);
      } else {
        input.value = '';
        input.focus();
        await loadItems();
      }
      setBusy(false);
    }

    async function toggle(id, checked) {
      if (isBusy) return;
      setBusy(true);
      showError('');
      const { error } = await db.from('shopping_items').update({ checked }).eq('id', id);
      if (error) showError('수정에 실패했습니다: ' + error.message);
      else await loadItems();
      setBusy(false);
    }

    async function remove(id) {
      if (isBusy) return;
      setBusy(true);
      showError('');
      const { error } = await db.from('shopping_items').delete().eq('id', id);
      if (error) showError('삭제에 실패했습니다: ' + error.message);
      else await loadItems();
      setBusy(false);
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const itemInput = document.getElementById('itemInput');
    let isComposing = false;
    itemInput.addEventListener('compositionstart', () => { isComposing = true; });
    itemInput.addEventListener('compositionend', () => { isComposing = false; });
    itemInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !isComposing) addItem();
    });

    loadItems();
  </script>
</body>
</html>
